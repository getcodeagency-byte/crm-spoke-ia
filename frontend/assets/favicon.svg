<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <linearGradient id="brandGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#00E676" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="15" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>
  <!-- Background with dark branding color -->
  <rect width="512" height="512" rx="140" fill="#111827" />
  <!-- Subtle glowing circle in center -->
  <circle cx="256" cy="256" r="160" fill="url(#brandGradient)" opacity="0.12" filter="url(#glow)" />
  <!-- Premium stroke border -->
  <rect x="24" y="24" width="464" height="464" rx="116" fill="none" stroke="url(#brandGradient)" stroke-width="12" opacity="0.85" />
  <!-- Branding Group: SPK! -->
  <g transform="translate(256, 262)">
    <text dominant-baseline="middle" 
          text-anchor="middle" 
          fill="url(#brandGradient)" 
          font-family="'Poppins', 'Inter', 'Segoe UI', sans-serif" 
          font-weight="900" 
          font-size="160" 
          letter-spacing="-4">SPK<tspan fill="#00E676">!</tspan></text>
  </g>
</svg>
